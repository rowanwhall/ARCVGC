server {
    listen 443 ssl;
    server_name arcvgc.com www.arcvgc.com;

    ssl_certificate /etc/letsencrypt/live/arcvgc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arcvgc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/arcvgc;
    index index.html;

    location = /privacy-policy {
        try_files /privacy-policy.html =404;
    }

    location = /terms-of-service {
        try_files /terms-of-service.html =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(wasm|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name arcvgc.com www.arcvgc.com;
    return 301 https://$host$request_uri;
}
