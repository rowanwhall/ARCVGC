<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC</title>
    <base href="/">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Open Graph (Discord, Facebook, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ARC">
    <meta property="og:description" content="Browse and analyze Pokemon VGC battle replays">
    <meta property="og:image" content="https://arcvgc.com/arc-logo.png?v=2">
    <meta property="og:url" content="https://arcvgc.com">
    <meta property="og:site_name" content="ARC">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://arcvgc.com/arc-logo.png?v=2">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: #FEF7FF;
        }
        #loading .spinner {
            width: 96px;
            height: 96px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: frames 460ms steps(1) infinite;
        }
        @media (prefers-color-scheme: dark) {
            #loading {
                background: #141218;
            }
        }
        @keyframes frames {
            0%      { background-image: url('loading_frame_0.png'); }
            28.26%  { background-image: url('loading_frame_1.png'); }
            50%     { background-image: url('loading_frame_2.png'); }
            78.26%  { background-image: url('loading_frame_3.png'); }
        }
    </style>
</head>
<body>
<div id="loading">
    <div class="spinner"></div>
</div>
<script
    src="https://browser.sentry-cdn.com/9.15.0/bundle.min.js"
    crossorigin="anonymous"
></script>
<script src="webApp.js"></script>
</body>
</html>
